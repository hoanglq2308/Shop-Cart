name: Complete CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  backend-tests:
    name: Backend Tests (JUnit 5 + Mockito)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ShopCart
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Maven wrapper
        run: chmod +x backend/mvnw

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done

      - name: Run Backend Unit Tests
        working-directory: backend
        run: ./mvnw clean test -DskipITs

      - name: Generate JaCoCo Report
        working-directory: backend
        run: ./mvnw jacoco:report
        continue-on-error: true

      - name: Upload Backend Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend Test Results

  frontend-unit-tests:
    name: Frontend Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Unit Tests with Coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload Frontend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Cart E2E Tests
        working-directory: frontend
        run: npx playwright test tests/e2e/cart.e2e.spec.js --reporter=html
        continue-on-error: true

      - name: Run Purchase E2E Tests
        working-directory: frontend
        run: npx playwright test tests/e2e/purchase.e2e.spec.js --reporter=html
        continue-on-error: true

      - name: Merge Playwright Reports
        if: always()
        working-directory: frontend
        run: |
          mkdir -p merged-report
          cp -r playwright-report/* merged-report/ || true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 30

  build-summary:
    name: Build Summary & Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-reports

      - name: Generate Summary Report
        run: |
          echo "# CI/CD Pipeline Summary" > summary.md
          echo "" >> summary.md
          echo "## Test Results" >> summary.md
          echo "- Backend Tests: $(if [ \"${{ needs.backend-tests.result }}\" = \"success\" ]; then echo \"✅ PASSED\"; else echo \"❌ FAILED\"; fi)" >> summary.md
          echo "- Frontend Unit Tests: $(if [ \"${{ needs.frontend-unit-tests.result }}\" = \"success\" ]; then echo \"✅ PASSED\"; else echo \"❌ FAILED\"; fi)" >> summary.md
          echo "- E2E Tests: $(if [ \"${{ needs.e2e-tests.result }}\" = \"success\" ]; then echo \"✅ PASSED\"; else echo \"❌ FAILED\"; fi)" >> summary.md
          echo "" >> summary.md
          echo "## Generated Reports" >> summary.md
          echo "- Backend Test Results" >> summary.md
          echo "- Backend JaCoCo Coverage" >> summary.md
          echo "- Frontend Coverage Report" >> summary.md
          echo "- Playwright E2E Report" >> summary.md
          echo "" >> summary.md
          echo "Timestamp: $(date)" >> summary.md
          cat summary.md

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Upload Summary Report
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: summary.md

      - name: Workflow Status
        run: |
          echo "Pipeline Status:"
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Unit Tests: ${{ needs.frontend-unit-tests.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          if [ "${{ needs.backend-tests.result }}" = "failure" ] || \
             [ "${{ needs.frontend-unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "Pipeline FAILED"
            exit 1
          fi
          echo "Pipeline PASSED ✅"
